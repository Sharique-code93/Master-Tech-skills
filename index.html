
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProSkill Hub Tech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#1e3a8a;
  --secondary:#ff6b00;
  --accent:#22c55e;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(-45deg,#e0f2fe,#f8fafc,#e2e8f0,#dbeafe);
  background-size:400% 400%;
  animation:bg 10s infinite;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#fff;
}

.logo{
  font-size:24px;
  font-weight:700;
  color:var(--primary);
}
.logo span{color:var(--secondary);}

nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}

nav a{
  text-decoration:none;
  color:#000;
  font-weight:600;
}

.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  padding:40px 20px;
}

.hero-left{flex:1;}
.hero-right{flex:1;text-align:center;}

.hero h1{
  font-size:36px;
  color:var(--primary);
}

.hero p{
  margin:15px 0;
}

.btn{
  display:inline-block;
  padding:12px 18px;
  border-radius:8px;
  font-weight:600;
  margin-right:10px;
}

.primary{
  background:var(--secondary);
  color:#fff;
}

.whatsapp{
  background:var(--accent);
  color:#fff;
}

.hero img{
  max-width:350px;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<header>
  <h2 class="logo">ProSkill Hub<span>Tech</span></h2>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Course</a></li>
      <li><a href="#">Register</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <div class="hero-left">
    <h1>Become Oracle SQL & PL/SQL Expert</h1>
    <p>Learn SQL, PL/SQL, Real-Time Projects & Crack Interviews.</p>

    <!-- YOUR BUTTONS -->
    <a href="#register" class="btn primary">Enroll Now</a>
    <a href="https://wa.me/919730400743" class="btn whatsapp">WhatsApp</a>

  </div>

  <div class="hero-right">
    <img src="glenn-carstens-peters-npxXWgQ33ZQ-unsplash.jpg">
  </div>
</section>

</body>
</html>
